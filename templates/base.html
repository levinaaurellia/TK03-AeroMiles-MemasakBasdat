{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroMiles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'dashboard_staf' %}">AeroMiles</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'dashboard_staf' %}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'claim_missing_miles_member' %}">Klaim Miles</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'kelola_mitra' %}">Kelola Mitra</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'kelola_hadiah' %}">Kelola Hadiah</a></li>
                <li class="nav-item"><a class="nav-link text-warning" href="{% url 'logout' %}">Logout</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container">
    {% block content %}
    {% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        // Cari semua elemen dengan class 'toast'
        var toastElList = [].slice.call(document.querySelectorAll('.toast'))
        
        // Aktifkan dan tampilkan masing-masing toast
        var toastList = toastElList.map(function (toastEl) {
            var toast = new bootstrap.Toast(toastEl)
            toast.show()
            return toast
        })
    });
</script>
</body>
</html>

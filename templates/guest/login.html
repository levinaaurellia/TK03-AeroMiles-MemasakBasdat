{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroMiles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="container d-flex flex-column justify-content-center align-items-center vh-100">
        
        <div class="text-center mb-4">
            <div class="bg-primary text-white rounded d-inline-flex justify-content-center align-items-center mb-2" style="width: 40px; height: 40px;">
                <i class="bi bi-airplane-fill fs-5"></i>
            </div>
            <h3 class="fw-bold mb-1">Selamat Datang</h3>
            <p class="text-muted small">Masuk ke akun AeroMiles Anda</p>
        </div>

        <div class="card shadow-sm border-0 rounded-3" style="width: 100%; max-width: 400px;">
            <div class="card-body p-4">
                {% if messages %}
                    <div class="mb-3">
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} alert-dismissible fade show p-2 mb-1" role="alert" style="font-size: 0.85rem;">
                                {{ message }}
                                <button type="button" class="btn-close p-2" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}
                <h6 class="fw-bold mb-1">Login</h6>
                <p class="text-muted mb-4" style="font-size: 0.85rem;">Masukkan email dan password Anda</p>

                <form action="" method="POST">
                    {% csrf_token %} 

                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold" style="font-size: 0.85rem;">Email</label>
                        <input type="email" class="form-control form-control-sm py-2" id="email" name="email" placeholder="email@example.com" required>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold" style="font-size: 0.85rem;">Password</label>
                        <input type="password" class="form-control form-control-sm py-2" id="password" name="password" placeholder="********" required>
                    </div>

                    <button type="submit" class="btn btn-aeromiles w-100 fw-bold py-2" style="font-size: 0.9rem;">
                        Log in
                    </button>
                </form>
            </div>
        </div>

        <div class="mt-4 text-center">
            <a href="{% url 'register' %}" class="text-decoration-none text-aeromiles fw-semibold" style="font-size: 0.9rem;">
                Belum punya akun? Daftar di sini
            </a>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
